<!DOCTYPE html>

    <title>Assignment - PLP</title>
    <link rel="stylesheet" href="./plp.css">
</head>
<body>
    <main class="plpPage">

            <h4>NORTHGRAIN</h4>

    <script>
        window.shopifyLiquidValuesPLP = window.shopifyLiquidValuesPLP ?? {
